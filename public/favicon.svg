<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Portfolio Logo">
  <title>Portfolio</title>
  <desc>Chinh's personal portfolio logo — geometric P mark</desc>

  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="purpleGradRev" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1230"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>

    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7C3AED" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Outer hexagon ring (subtle) -->
  <path
    d="M32 6 L54.39 19 L54.39 45 L32 58 L9.61 45 L9.61 19 Z"
    fill="none"
    stroke="url(#purpleGradRev)"
    stroke-width="1.2"
    stroke-opacity="0.3"
  />

  <!-- Hexagon background fill -->
  <path
    d="M32 11 L50.93 21.5 L50.93 42.5 L32 53 L13.07 42.5 L13.07 21.5 Z"
    fill="url(#purpleGrad)"
    fill-opacity="0.12"
  />

  <!-- ============ P letterform ============ -->

  <!-- P stem: vertical bar with rounded ends -->
  <rect
    x="19" y="18"
    width="8" height="28"
    rx="4" ry="4"
    fill="url(#stemGrad)"
    filter="url(#subtleShadow)"
  />

  <!-- P bowl: horizontal top arm (left anchor to stem top) -->
  <path
    d="M27 18
       H36
       Q44 18 44 26
       Q44 34 36 34
       H27"
    fill="url(#purpleGrad)"
    filter="url(#glow)"
  />

  <!-- P bowl: vertical closing bar (right side of bowl) -->
  <rect
    x="36" y="18"
    width="6" height="18"
    rx="3" ry="3"
    fill="url(#purpleGrad)"
    filter="url(#subtleShadow)"
  />

  <!-- ============ Accent dots ============ -->
  <!-- Dot 1: small circle accent top-right of bowl -->
  <circle cx="46" cy="14" r="2.5" fill="#A855F7" fill-opacity="0.7"/>

  <!-- Dot 2: tiny sparkle bottom-left -->
  <circle cx="14" cy="50" r="1.8" fill="#7C3AED" fill-opacity="0.5"/>

  <!-- Dot 3: tiny sparkle top-right corner -->
  <circle cx="54" cy="10" r="1.2" fill="#A855F7" fill-opacity="0.4"/>

  <!-- ============ Bottom accent line ============ -->
  <!-- A subtle underline suggesting a portfolio card / showcase bar -->
  <rect
    x="22" y="52"
    width="20" height="2.5"
    rx="1.25" ry="1.25"
    fill="url(#purpleGradRev)"
    fill-opacity="0.6"
  />
</svg>
